name: Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.0.0. Defaults to the tag name without v."
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  package-windows:
    name: Package Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve release version
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "${{ github.ref_name }}"
          }
          $releaseVersion = $version -replace '^v', ''
          $packageVersion = ($releaseVersion -replace '[^0-9.].*$', '')
          if ($packageVersion -notmatch '^\d+(\.\d+){1,3}$') {
            throw "MSI package version must be numeric, for example 1.0.0. Got '$releaseVersion'."
          }
          "RELEASE_VERSION=$releaseVersion" | Out-File -FilePath $env:GITHUB_ENV -Append
          "APP_VERSION=$packageVersion" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: webui/package-lock.json

      - name: Install build tools
        shell: pwsh
        run: |
          choco install ninja cuda -y --no-progress

      - name: Package ZIP and MSI
        shell: pwsh
        run: |
          .\scripts\package-windows.ps1 -BuildMsi -RequireMsi -Clean

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          Copy-Item composeApp\build\compose\binaries\main\portable\*.zip artifacts\
          Copy-Item composeApp\build\compose\binaries\main\msi\*.msi artifacts\
          Get-ChildItem artifacts

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: diffusion-desk-windows-${{ env.RELEASE_VERSION }}
          path: artifacts/*

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.RELEASE_VERSION }}
          target_commitish: ${{ github.sha }}
          name: Diffusion Desk ${{ env.RELEASE_VERSION }}
          prerelease: ${{ inputs.prerelease || false }}
          files: artifacts/*
