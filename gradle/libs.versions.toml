[versions]
compose-plugin = "1.7.3"
kotlin = "2.1.10"

[libraries]
androidx-lifecycle-viewmodel-compose = "org.jetbrains.androidx.lifecycle:lifecycle-viewmodel-compose:2.8.0"

[plugins]
