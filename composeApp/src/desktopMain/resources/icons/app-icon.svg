<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#12121a;stop-opacity:1"></stop>
      <stop offset="100%" style="stop-color:#1e1e2e;stop-opacity:1"></stop>
    </linearGradient>

    <linearGradient id="dGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f2fe;stop-opacity:1"></stop>
      <stop offset="40%" style="stop-color:#4facfe;stop-opacity:1"></stop>
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1"></stop>
    </linearGradient>

    <filter id="intenseGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur1"></feGaussianBlur>
      <feGaussianBlur stdDeviation="30" result="blur2"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur2"></feMergeNode>
        <feMergeNode in="blur1"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.5"></feDropShadow>
    </filter>

    <pattern id="noise" width="50" height="50" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="white" opacity="0.15"></circle>
      <circle cx="30" cy="20" r="1.5" fill="white" opacity="0.1"></circle>
      <circle cx="40" cy="40" r="1" fill="white" opacity="0.2"></circle>
    </pattern>
  </defs>

  <rect width="512" height="512" rx="110" fill="url(#bgGrad)"></rect>

  <circle cx="256" cy="256" r="140" fill="url(#dGrad)" opacity="0.2" filter="url(#intenseGlow)"></circle>

  <g filter="url(#dropShadow)">
    <rect x="110" y="390" width="292" height="6" rx="3" fill="#4a4a6a" opacity="0.8"></rect>
    <rect x="160" y="402" width="192" height="4" rx="2" fill="#4a4a6a" opacity="0.4"></rect>
  </g>

  <g filter="url(#dropShadow)">
    <path d="M150 130 L250 130 C340 130, 380 180, 380 260 C380 340, 340 390, 250 390 L150 390 Z" fill="url(#dGrad)" filter="url(#intenseGlow)" opacity="0.8"></path>
    <path d="M150 130 L250 130 C340 130, 380 180, 380 260 C380 340, 340 390, 250 390 L150 390 Z" fill="url(#dGrad)"></path>
    <path d="M150 130 L250 130 C340 130, 380 180, 380 260 C380 340, 340 390, 250 390 L150 390 Z" fill="url(#noise)"></path>
  </g>

  <path d="M180 160 L240 160 C310 160, 340 190, 340 260 C340 330, 310 360, 240 360 L180 360 Z" fill="#12121a"></path>
  <path d="M180 160 L240 160 C310 160, 340 190, 340 260 C340 330, 310 360, 240 360 L180 360 Z" fill="none" stroke="#00f2fe" stroke-width="4" filter="url(#intenseGlow)" opacity="0.9"></path>

  <path d="M120 100 L125 115 L140 120 L125 125 L120 140 L115 125 L100 120 L115 115 Z" fill="#ffffff" filter="url(#intenseGlow)" opacity="0.9"></path>
  <path d="M390 90 L393 100 L403 103 L393 106 L390 116 L387 106 L377 103 L387 100 Z" fill="#f093fb" filter="url(#intenseGlow)" opacity="0.8"></path>

  <circle cx="130" cy="350" r="5" fill="#00f2fe" filter="url(#intenseGlow)" opacity="0.8"></circle>
  <circle cx="110" cy="320" r="3" fill="#4facfe" opacity="0.6"></circle>
  <circle cx="380" cy="360" r="6" fill="#f093fb" filter="url(#intenseGlow)" opacity="0.8"></circle>
  <circle cx="400" cy="330" r="4" fill="#00f2fe" opacity="0.6"></circle>
  <circle cx="256" cy="100" r="3" fill="white" opacity="0.5"></circle>
</svg>
